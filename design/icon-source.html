<!DOCTYPE html>
<html>
<head><style>body{margin:0;display:flex;background:transparent}</style></head>
<body>
<!-- LIGHT VARIANT -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="sqL"><rect x="16" y="16" width="480" height="480" rx="108"/></clipPath>
    <radialGradient id="bgL1" cx="0.12" cy="0.1" r="0.9">
      <stop offset="0%" stop-color="hsla(150,80%,82%,0.95)"/><stop offset="100%" stop-color="hsla(150,80%,82%,0)"/>
    </radialGradient>
    <radialGradient id="bgL2" cx="0.92" cy="0.15" r="0.8">
      <stop offset="0%" stop-color="hsla(190,85%,80%,0.8)"/><stop offset="100%" stop-color="hsla(190,85%,80%,0)"/>
    </radialGradient>
    <radialGradient id="bgL3" cx="0.5" cy="1.05" r="0.9">
      <stop offset="0%" stop-color="hsla(252,70%,88%,0.85)"/><stop offset="100%" stop-color="hsla(252,70%,88%,0)"/>
    </radialGradient>
    <linearGradient id="scrFillL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.60)"/><stop offset="55%" stop-color="rgba(255,255,255,0.20)"/><stop offset="100%" stop-color="rgba(255,255,255,0.34)"/>
    </linearGradient>
    <radialGradient id="scrGreenL" cx="0.5" cy="0.72" r="0.85">
      <stop offset="0%" stop-color="rgba(28,199,73,0.28)"/><stop offset="75%" stop-color="rgba(28,199,73,0.07)"/><stop offset="100%" stop-color="rgba(28,199,73,0)"/>
    </radialGradient>
    <linearGradient id="rimL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/><stop offset="50%" stop-color="rgba(255,255,255,0.35)"/><stop offset="100%" stop-color="rgba(255,255,255,0.75)"/>
    </linearGradient>
    <linearGradient id="specL" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="sqRimL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/><stop offset="100%" stop-color="rgba(255,255,255,0.3)"/>
    </linearGradient>
    <filter id="blurS" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blurM" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>
  <g clip-path="url(#sqL)">
    <rect x="16" y="16" width="480" height="480" fill="#eef6f0"/>
    <rect x="16" y="16" width="480" height="480" fill="url(#bgL1)"/>
    <rect x="16" y="16" width="480" height="480" fill="url(#bgL2)"/>
    <rect x="16" y="16" width="480" height="480" fill="url(#bgL3)"/>
    <!-- drop shadow under screen -->
    <ellipse cx="256" cy="392" rx="160" ry="20" fill="rgba(20,90,50,0.30)" filter="url(#blurM)"/>
    <!-- glass screen 16:10 -->
    <g>
      <rect x="96" y="156" width="320" height="200" rx="30" fill="url(#scrFillL)"/>
      <rect x="96" y="156" width="320" height="200" rx="30" fill="url(#scrGreenL)"/>
      <!-- inner bottom glow -->
      <path d="M150 344 C 200 358, 312 358, 362 344" stroke="rgba(170,240,200,0.9)" stroke-width="10" fill="none" filter="url(#blurS)"/>
      <!-- specular sweep -->
      <ellipse cx="178" cy="180" rx="76" ry="24" fill="url(#specL)" transform="rotate(-8 178 180)" filter="url(#blurS)"/>
      <circle cx="382" cy="180" r="9" fill="rgba(255,255,255,0.95)" filter="url(#blurS)"/>
      <!-- rim -->
      <rect x="96" y="156" width="320" height="200" rx="30" fill="none" stroke="url(#rimL)" stroke-width="3"/>
      <!-- play triangle -->
      <path d="M226 206 L 226 306 L 312 256 Z" fill="rgba(18,140,60,0.92)" stroke-linejoin="round" stroke="rgba(18,140,60,0.92)" stroke-width="14"/>
    </g>
    <!-- expand corners（full view 擴展角） -->
    <g stroke="rgba(20,80,45,0.85)" stroke-width="18" stroke-linecap="round" fill="none">
      <path d="M84 122 L 84 86 L 120 86"/>
      <path d="M392 86 L 428 86 L 428 122"/>
      <path d="M428 390 L 428 426 L 392 426"/>
      <path d="M120 426 L 84 426 L 84 390"/>
    </g>
  </g>
  <rect x="17.5" y="17.5" width="477" height="477" rx="106.5" fill="none" stroke="url(#sqRimL)" stroke-width="3"/>
</svg>

<!-- DARK VARIANT -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="sqD"><rect x="16" y="16" width="480" height="480" rx="108"/></clipPath>
    <radialGradient id="bgD1" cx="0.12" cy="0.1" r="0.9">
      <stop offset="0%" stop-color="hsla(155,45%,16%,0.95)"/><stop offset="100%" stop-color="hsla(155,45%,16%,0)"/>
    </radialGradient>
    <radialGradient id="bgD2" cx="0.92" cy="0.15" r="0.8">
      <stop offset="0%" stop-color="hsla(195,45%,18%,0.85)"/><stop offset="100%" stop-color="hsla(195,45%,18%,0)"/>
    </radialGradient>
    <radialGradient id="bgD3" cx="0.5" cy="1.05" r="0.9">
      <stop offset="0%" stop-color="hsla(252,40%,20%,0.8)"/><stop offset="100%" stop-color="hsla(252,40%,20%,0)"/>
    </radialGradient>
    <linearGradient id="scrFillD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.32)"/><stop offset="55%" stop-color="rgba(255,255,255,0.08)"/><stop offset="100%" stop-color="rgba(255,255,255,0.16)"/>
    </linearGradient>
    <radialGradient id="scrGreenD" cx="0.5" cy="0.72" r="0.85">
      <stop offset="0%" stop-color="rgba(34,214,84,0.32)"/><stop offset="75%" stop-color="rgba(34,214,84,0.08)"/><stop offset="100%" stop-color="rgba(34,214,84,0)"/>
    </radialGradient>
    <linearGradient id="rimD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/><stop offset="50%" stop-color="rgba(255,255,255,0.18)"/><stop offset="100%" stop-color="rgba(255,255,255,0.5)"/>
    </linearGradient>
    <linearGradient id="specD" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="sqRimD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/><stop offset="100%" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
    <filter id="blurS2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="blurM2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>
  <g clip-path="url(#sqD)">
    <rect x="16" y="16" width="480" height="480" fill="#04080a"/>
    <rect x="16" y="16" width="480" height="480" fill="url(#bgD1)"/>
    <rect x="16" y="16" width="480" height="480" fill="url(#bgD2)"/>
    <rect x="16" y="16" width="480" height="480" fill="url(#bgD3)"/>
    <ellipse cx="256" cy="392" rx="160" ry="20" fill="rgba(0,0,0,0.6)" filter="url(#blurM2)"/>
    <g>
      <rect x="96" y="156" width="320" height="200" rx="30" fill="url(#scrFillD)"/>
      <rect x="96" y="156" width="320" height="200" rx="30" fill="url(#scrGreenD)"/>
      <path d="M150 344 C 200 358, 312 358, 362 344" stroke="rgba(110,230,160,0.7)" stroke-width="10" fill="none" filter="url(#blurS2)"/>
      <ellipse cx="178" cy="180" rx="76" ry="24" fill="url(#specD)" transform="rotate(-8 178 180)" filter="url(#blurS2)"/>
      <circle cx="382" cy="180" r="9" fill="rgba(255,255,255,0.8)" filter="url(#blurS2)"/>
      <rect x="96" y="156" width="320" height="200" rx="30" fill="none" stroke="url(#rimD)" stroke-width="3"/>
      <path d="M226 206 L 226 306 L 312 256 Z" fill="rgba(110,235,160,0.95)" stroke-linejoin="round" stroke="rgba(110,235,160,0.95)" stroke-width="14"/>
    </g>
    <g stroke="rgba(190,245,210,0.85)" stroke-width="18" stroke-linecap="round" fill="none">
      <path d="M84 122 L 84 86 L 120 86"/>
      <path d="M392 86 L 428 86 L 428 122"/>
      <path d="M428 390 L 428 426 L 392 426"/>
      <path d="M120 426 L 84 426 L 84 390"/>
    </g>
  </g>
  <rect x="17.5" y="17.5" width="477" height="477" rx="106.5" fill="none" stroke="url(#sqRimD)" stroke-width="3"/>
</svg>
</body>
</html>
